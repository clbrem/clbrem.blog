      <stop offset="0%" stop-color="#08121f" />
      <stop offset="55%" stop-color="#10233d" />
      <stop offset="100%" stop-color="#1a3256" />
    </linearGradient>
  </defs>
  <rect width="300" height="100" fill="url(#bg-gradient)" rx="6" />
  <g id="mesh" stroke="#e6f0ff" stroke-opacity="0.55" stroke-width="1.2">
